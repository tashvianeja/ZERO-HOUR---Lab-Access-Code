<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antidote Lab Authorization Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#070707;
      --panel:#111214;
      --line:#1f2b1f;
      --toxic:#5dff7a;
      --warn:#ff3b30;
      --rust:#c36a2d;
      --text:#cfd6cf;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 20% 10%, #131313 0%, transparent 40%),
        radial-gradient(circle at 80% 90%, #0e1a0e 0%, transparent 35%),
        var(--bg);
      color:var(--text);
      font-family:'Share Tech Mono', monospace;
      overflow:hidden;
    }

    .terminal {
      position:relative;
      width:min(92vw, 760px);
      border:1px solid #2a2a2a;
      background:linear-gradient(180deg, #141414 0%, #0f0f10 100%);
      box-shadow:
        0 0 0 1px #000 inset,
        0 0 25px rgba(0,0,0,.85),
        0 0 40px rgba(93,255,122,.08);
      border-radius:10px;
      padding:28px 24px 24px;
      isolation:isolate;
    }

    .terminal::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.03) 0px,
          rgba(255,255,255,.03) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity:.25;
      z-index:2;
      border-radius:10px;
    }

    .terminal::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius:10px;
      background:
        radial-gradient(circle at center, transparent 55%, rgba(0,0,0,.5) 100%),
        linear-gradient(180deg, rgba(93,255,122,.04), rgba(255,59,48,.02));
      z-index:1;
    }

    .content{
      position:relative;
      z-index:3;
    }

    .header{
      margin:0 0 6px 0;
      font-family:'Special Elite', monospace;
      font-size:clamp(1.2rem, 2.5vw, 1.8rem);
      letter-spacing:1px;
      color:var(--toxic);
      text-shadow:0 0 8px rgba(93,255,122,.45);
      animation:flicker 2.8s infinite;
    }

    .sub{
      margin:0 0 18px 0;
      color:#9aa39a;
      font-size:.95rem;
      border-left:3px solid var(--rust);
      padding-left:10px;
    }

    .prompt{
      margin:0 0 10px;
      color:#dce5dc;
      font-size:1.03rem;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    input[type="text"]{
      flex:1;
      min-width:220px;
      background:#0a0b0a;
      color:var(--toxic);
      border:1px solid #2f4b2f;
      outline:none;
      padding:10px 12px;
      font-family:inherit;
      font-size:1rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      box-shadow:inset 0 0 10px rgba(0,0,0,.6);
    }

    input[type="text"]:focus{
      border-color:var(--toxic);
      box-shadow:0 0 0 2px rgba(93,255,122,.15), inset 0 0 10px rgba(0,0,0,.6);
    }

    button{
      border:1px solid #385638;
      background:linear-gradient(180deg, #1a241a, #111712);
      color:#d7ffd9;
      padding:10px 16px;
      cursor:pointer;
      font-family:inherit;
      font-size:.95rem;
      letter-spacing:.08em;
      transition:transform .05s ease, filter .2s ease, border-color .2s ease;
      text-shadow:0 0 6px rgba(93,255,122,.35);
    }

    button:hover{
      filter:brightness(1.08);
      border-color:var(--toxic);
    }

    button:active{
      transform:translateY(1px);
    }

    button:disabled,
    input:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    #message{
      min-height:150px;
      margin:0;
      padding:12px;
      border:1px solid #2a2a2a;
      background:#0b0c0c;
      white-space:pre-line;
      line-height:1.35;
      font-size:.98rem;
    }

    .ok{
      color:var(--toxic);
      border-color:#2a5f37 !important;
      box-shadow:0 0 14px rgba(93,255,122,.08) inset;
      text-shadow:0 0 8px rgba(93,255,122,.35);
    }

    .err{
      color:var(--warn);
      border-color:#6a2622 !important;
      box-shadow:0 0 14px rgba(255,59,48,.08) inset;
      text-shadow:0 0 8px rgba(255,59,48,.3);
    }

    @keyframes flicker{
      0%, 18%, 22%, 25%, 53%, 57%, 100%{opacity:1}
      20%, 24%, 55%{opacity:.55}
    }
  </style>
</head>
<body>
  <section class="terminal" aria-label="Antidote lab authorization terminal">
    <div class="content">
      <h1 class="header">ANTIDOTE LAB AUTHORIZATION TERMINAL</h1>
      <p class="sub">NODE-17 RELAY STATUS: DEGRADED // BUNKER LINK: INTERMITTENT</p>

      <p class="prompt">Enter Antidote Lab Authorization Code:</p>
      <div class="controls">
        <input id="codeInput" type="text" maxlength="8" autocomplete="off" spellcheck="false" />
        <button id="authBtn" type="button">AUTHENTICATE</button>
      </div>

      <p id="message" aria-live="polite"></p>
    </div>
  </section>

  <script>
    const input = document.getElementById("codeInput");
    const button = document.getElementById("authBtn");
    const message = document.getElementById("message");

    let isVerifying = false;

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function authenticate() {
      if (isVerifying) return;

      isVerifying = true;
      const entered = input.value.trim();

      message.textContent = "⏳ VERIFYING...";
      message.classList.remove("ok", "err");

      input.disabled = true;
      button.disabled = true;

      try {
        const [response] = await Promise.all([
          fetch("/api/authorize", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ code: entered })
          }),
          wait(1000)
        ]);

        const data = await response.json();
        message.textContent = data.message;
        message.classList.remove("ok", "err");
        message.classList.add(data.ok ? "ok" : "err");

        if (data.ok) {
          input.value = "";
        }
      } catch {
        message.textContent = "❌ AUTHORIZATION FAILED\nServer unavailable.";
        message.classList.remove("ok");
        message.classList.add("err");
      }

      input.disabled = false;
      button.disabled = false;
      input.focus();
      isVerifying = false;
    }

    button.addEventListener("click", authenticate);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") authenticate();
    });
  </script>
</body>
</html>
